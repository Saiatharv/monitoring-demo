apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-cloud-values
  namespace: flux-system
data:
  values.yaml: |
    cluster:
      name: monitoring-demo

    destinations:
      grafana-cloud-metrics:
        type: prometheus
        url: https://prometheus-prod-65-prod-eu-west-2.grafana.net/api/prom/push
        auth:
          type: basic
          username: "monitoring-demotoken"
          password: "glc_eyJvIjoiMTgwOTY4OSIsIm4iOiJzdGFjay0xNjg4NjMyLWludGVncmF0aW9uLW1vbml0b3JpbmctZGVtb3Rva2VuLW1vbml0b3JpbmctZGVtb3Rva2VuIiwiayI6IkJGMEI5QTdoNkRkM2doYkNhYzIxOHc5OCIsIm0iOnsiciI6InByb2QtZXUtd2VzdC0yIn19"

    collectors:
      alloy-metrics:
        presets: [clustered, statefulset]
      alloy-singleton: {}

    clusterMetrics:
      enabled: true
      collector: alloy-metrics
      destinations:
        - grafana-cloud-metrics
      kube-state-metrics:
        labelMatchers:
          app.kubernetes.io/name: kube-state-metrics   # ← use existing
      node-exporter:
        labelMatchers:
          app.kubernetes.io/name: prometheus-node-exporter  # ← use existing

    clusterEvents:
      enabled: true
      collector: alloy-singleton
      destinations:
        - grafana-cloud-metrics

    podLogs:
      enabled: false

    telemetryServices:
      kube-state-metrics:
        deploy: false     # ← don't deploy new one, use existing
      node-exporter:
        deploy: false     # ← don't deploy new one, use existing
