apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboards-values
  namespace: flux-system
data:
  values.yaml: |
    opensearchHosts: "http://opensearch-cluster-master:9200"

    service:
      type: NodePort
      nodePort: 32003

    resources:
      requests:
        memory: "512Mi"
      limits:
        memory: "1Gi"


