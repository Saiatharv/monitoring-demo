apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: sample-app-alerts
  labels:
    release: monitoring
spec:
  groups:
    - name: sample-app.rules
      rules:
        - alert: SampleAppDown
          expr: up{service="sample-app"} == 0
          for: 30s
          labels:
            severity: critical
          annotations:
            summary: "Sample App is down"
            description: "The sample app has not been responding for 30 seconds."
