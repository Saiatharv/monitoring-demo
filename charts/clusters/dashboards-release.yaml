apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dashboards
  namespace: default
spec:
  interval: 5m
  chart:
    spec:
      chart: opensearch-dashboards
      version: "2.18.0"
      sourceRef:
        kind: HelmRepository
        name: opensearch
        namespace: flux-system
  valuesFrom:
    - kind: ConfigMap
      name: dashboards-values
